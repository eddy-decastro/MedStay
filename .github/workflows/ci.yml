# Nom affiche dans l'onglet "Actions" de GitHub.
name: CI

# --- DECLENCHEURS ---------------------------------------------------------
# Quand ce workflow tourne. Ici : a chaque push, et a chaque pull request.
# Le "push" couvre le flux solo (tu pushes sur master) ; le "pull_request"
# servira si tu ouvres des PR plus tard.
on:
  push:
  pull_request:

# --- JOBS -----------------------------------------------------------------
# Un workflow contient un ou plusieurs jobs. Chaque job = une VM neuve,
# detruite a la fin. Les jobs tournent en parallele sauf dependance explicite.
jobs:
  lint:
    # Image de la VM fournie par GitHub (gratuite sur repo public).
    runs-on: ubuntu-latest

    # Les steps s'executent dans l'ordre, sur la MEME VM.
    # Si un step echoue, les suivants sont annules et le job est rouge.
    steps:
      # 1) La VM demarre vierge : il faut y cloner le repo, sinon il n'y a
      #    rien a linter. "uses" = action reutilisable publiee par GitHub.
      #    Le @v4 epingle la version majeure de l'action.
      - uses: actions/checkout@v4

      # 2) Installe l'interpreteur Python. On fixe 3.11 pour coller au
      #    Dockerfile (python:3.11-slim) : la CI doit tester le meme runtime
      #    que la prod, sinon elle valide autre chose que ce qui est deploye.
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3) Incrément 1 : lint SEUL. On n'installe donc pas requirements.txt
      #    (lightgbm, streamlit... ~300 Mo inutiles ici) : juste ruff.
      #    Version EPINGLEE et identique au local : une version differente
      #    peut appliquer d'autres regles et rendre la CI rouge alors que
      #    ton local est vert.
      - name: Installer ruff
        run: pip install ruff==0.8.4

      # 4) Les erreurs de lint (imports inutiles, variables mortes...).
      - name: Lint (ruff check)
        run: ruff check .

      # 5) Le formatage. "--check" ne REECRIT rien : il echoue si un fichier
      #    n'est pas au format attendu. En CI on verifie, on ne modifie jamais
      #    le code (un runner ne doit pas pousser de commit tout seul).
      - name: Format (ruff format --check)
        run: ruff format --check .

  # --- INCREMENT 2 : les tests -------------------------------------------
  # Job SEPARE de "lint", donc VM distincte tournant EN PARALLELE. Avantages :
  # retour plus rapide, et on voit d'un coup d'oeil si c'est le lint ou les
  # tests qui cassent. Cout : cette VM reinstalle tout de son cote.
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          # Met en cache le dossier pip entre deux runs, en se basant sur le
          # hash de requirements.txt. Tant que le fichier ne change pas, les
          # dependances sont restaurees au lieu d'etre retelechargees.
          cache: pip

      # Ici on a besoin de tout requirements.txt : les tests importent
      # src.api.main, donc fastapi, et TestClient a besoin de httpx.
      - name: Installer les dependances
        run: pip install -r requirements.txt

      # --cov=src mesure la couverture du code de src/ (cible >= 70 % fixee en
      # Phase 7). On ne fait que RAPPORTER pour l'instant : pas de seuil
      # bloquant tant que src/ est quasi vide, sinon la CI casse pour rien.
      - name: Tests (pytest + couverture)
        run: pytest --cov=src --cov-report=term-missing

  # --- INCREMENT 3 : build de l'image ------------------------------------
  # Render construit sa propre image a partir du Dockerfile. Ce job sert de
  # garde-fou : si le Dockerfile casse, on le voit ici plutot qu'en prod.
  # On BUILD seulement, sans push : aucun registre, donc aucun secret requis.
  docker:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Pas de setup-python ici : le runner ubuntu-latest a deja Docker
      # installe, et l'image se construit dans son propre environnement.
      - name: Build de l'image Docker
        run: docker build -t medstay:ci .

      # Verification minimale que l'image DEMARRE vraiment : une image qui se
      # construit peut tres bien crasher au lancement (mauvais CMD, shebang
      # CRLF...). On lance le conteneur, on interroge /health, on nettoie.
      - name: Verifier que le conteneur repond
        run: |
          docker run -d --name medstay-ci -e PORT=7860 -p 7860:7860 medstay:ci

          # On attend d'abord le HEALTHCHECK du conteneur, qui interroge l'API
          # interne. Le demarrage complet (chargement du modele LightGBM puis
          # boot de Streamlit) depasse regulierement une minute sur un runner
          # partage : un budget de retry trop court faisait echouer la CI alors
          # que le conteneur finissait par se lancer correctement.
          echo "Attente du HEALTHCHECK (max 180 s)..."
          for i in $(seq 1 36); do
            ETAT=$(docker inspect medstay-ci --format '{{.State.Health.Status}}')
            echo "  ${i}/36 : $ETAT"
            [ "$ETAT" = "healthy" ] && break
            # Inutile de patienter si le conteneur s'est arrete.
            [ "$(docker inspect medstay-ci --format '{{.State.Status}}')" != "running" ] && break
            sleep 5
          done

          docker inspect medstay-ci --format '{{.State.Health.Status}}' | grep -q healthy

          # Streamlit, sur le port expose. --retry-all-errors et non
          # --retry-connrefused : avec -p, docker-proxy accepte la connexion des
          # le "docker run" puis la reinitialise tant que l'application n'ecoute
          # pas. curl recoit alors une reponse vide (52) ou un reset (56),
          # jamais un ECONNREFUSED, que --retry-connrefused seul ne couvre pas.
          curl --retry 12 --retry-delay 5 --retry-all-errors --fail --silent \
               --output /dev/null http://localhost:7860

          # L'API n'est pas exposee hors du conteneur : on l'interroge depuis
          # l'interieur. C'est le vrai test de la chaine (start.sh a bien lance
          # les DEUX process).
          docker exec medstay-ci python -c "import urllib.request; \
            assert urllib.request.urlopen('http://localhost:8000/health').read() == b'{\"status\":\"ok\"}'"

          # Prediction reelle de bout en bout : verifie que le modele repond et
          # que l'intervalle est coherent (lower <= point <= upper).
          docker exec medstay-ci python -c "
          import json, urllib.request
          patient = {'race':'Caucasian','gender':'Female','age':'[70-80)',
                     'admission_type_id':'1','admission_source_id':'7',
                     'payer_code':'MC','medical_specialty':'InternalMedicine',
                     'diag_1':'Circulatory','diag_2':'Diabetes','diag_3':'Circulatory',
                     'max_glu_serum':'not_measured','A1Cresult':'>8',
                     'number_outpatient':0,'number_emergency':1,
                     'number_inpatient':2,'number_diagnoses':9}
          req = urllib.request.Request('http://localhost:8000/predict',
                                       data=json.dumps(patient).encode(),
                                       headers={'Content-Type':'application/json'})
          r = json.loads(urllib.request.urlopen(req).read())
          print('prediction :', r)
          assert r['lower_bound'] <= r['point_estimate'] <= r['upper_bound']
          assert r['interval_width'] > 0
          "

      # "if: always()" force ce step meme si le precedent a echoue : sans lui,
      # un echec laisserait le conteneur tourner et on perdrait ses logs.
      # "if: always()" force ce step meme si le precedent a echoue : sans lui, un
      # echec laisserait le conteneur tourner et on perdrait ses logs.
      #
      # Les logs sont AUSSI emis en annotation GitHub : contrairement aux logs
      # de job, les annotations sont lisibles via l'API publique, ce qui permet
      # de diagnostiquer un echec sans se connecter a l'interface.
      - name: Logs du conteneur et nettoyage
        if: always()
        run: |
          echo "--- etat du conteneur ---"
          docker ps -a --filter name=medstay-ci --format '{{.Status}}' || true

          ETAT=$(docker inspect medstay-ci --format '{{.State.Status}} exit={{.State.ExitCode}}' 2>/dev/null || echo inconnu)
          LOGS=$(docker logs medstay-ci 2>&1 | tail -30 || echo "aucun log")

          echo "$LOGS"

          # Les annotations n'acceptent pas de saut de ligne brut : %0A est
          # l'echappement attendu par GitHub Actions.
          echo "::error title=Conteneur ($ETAT)::$(echo "$LOGS" | sed ':a;N;$!ba;s/\n/%0A/g')"

          docker rm -f medstay-ci || true

# --- DEPLOIEMENT ------------------------------------------------------------
# Pas de job "deploy" ici : Render a sa propre option "Auto-Deploy: After CI
# checks pass" qui ecoute directement les status checks GitHub (ces 3 jobs) et
# ne deploie que s'ils sont tous verts. Meme garde-fou que "needs: [...]" +
# Deploy Hook, en natif, sans secret a gerer cote GitHub.
